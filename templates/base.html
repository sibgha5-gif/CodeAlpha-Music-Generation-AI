<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}AI Music Generation Studio{% endblock %}</title>

    <!-- Bootstrap 5 -->
    <link href="https://cdnjs.cloudflare.com/ajax/libs/bootstrap/5.3.3/css/bootstrap.min.css" rel="stylesheet">
    <!-- Bootstrap Icons -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/bootstrap-icons/1.11.3/font/bootstrap-icons.min.css">
    <!-- Google Font -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <!-- Custom Styles -->
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">

    {% block head %}{% endblock %}
</head>
<body>

    <!-- ================= NAVBAR ================= -->
    <nav class="navbar navbar-expand-lg navbar-glass fixed-top">
        <div class="container">
            <a class="navbar-brand" href="{{ url_for('index') }}">
                <i class="bi bi-soundwave brand-icon"></i>
                AI Music <span class="text-gradient">Studio</span>
            </a>
            <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navMenu">
                <span class="navbar-toggler-icon"></span>
            </button>
            <div class="collapse navbar-collapse" id="navMenu">
                <ul class="navbar-nav ms-auto">
                    <li class="nav-item"><a class="nav-link" href="{{ url_for('index') }}">Home</a></li>
                    <li class="nav-item"><a class="nav-link" href="{{ url_for('dashboard') }}">Dashboard</a></li>
                    <li class="nav-item">
                        <a class="nav-link" href="https://github.com" target="_blank" rel="noopener">
                            <i class="bi bi-github"></i> GitHub
                        </a>
                    </li>
                </ul>
            </div>
        </div>
    </nav>

    <!-- ================= TOAST CONTAINER ================= -->
    <div class="toast-container position-fixed top-0 end-0 p-3" id="toastContainer" style="z-index: 1080; margin-top: 70px;"></div>

    <!-- ================= PAGE CONTENT ================= -->
    <main>
        {% block content %}{% endblock %}
    </main>

    <!-- ================= FOOTER ================= -->
    <footer class="footer-glass mt-5">
        <div class="container py-4 text-center">
            <p class="mb-1">
                <i class="bi bi-soundwave"></i>
                <strong>AI Music Generation Studio</strong>
            </p>
            <p class="text-muted small mb-0">
                Built with TensorFlow, Flask &amp; music21 &middot; Created for internship portfolio &middot; &copy; <span id="year"></span>
            </p>
        </div>
    </footer>

    <!-- ================= SCRIPTS ================= -->
   <script src="https://cdnjs.cloudflare.com/ajax/libs/bootstrap/5.3.3/js/bootstrap.bundle.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.3/chart.umd.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/tone/14.8.49/Tone.js"></script>

<!-- ADD THIS LINE -->
<script src="https://cdn.jsdelivr.net/npm/@tonejs/midi@2.0.28/build/Midi.min.js"></script>

<script src="{{ url_for('static', filename='js/main.js') }}"></script>
<script>document.getElementById('year').textContent = new Date().getFullYear();</script>

    {% block scripts %}{% endblock %}
</body>
</html>
